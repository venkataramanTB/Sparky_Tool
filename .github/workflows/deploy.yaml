name: Deploy Sparky Tool (Frontend & Backend)

on:
  push:
    branches:
      - main

jobs:
  # JOB 1: Build React and push to OCI Static Object Storage
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Run Frontend Tests
        working-directory: frontend
        run: npm test

      - name: Build Frontend
        working-directory: frontend
        run: |
          echo "VITE_CLERK_PUBLISHABLE_KEY=${{ secrets.VITE_CLERK_PUBLISHABLE_KEY }}" > .env
          echo "VITE_API_URL=${{ secrets.PRODUCTION_API_URL }}" >> .env
          npm run build

      - name: Install OCI CLI
        run: pip install oci-cli

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          echo "[DEFAULT]" > ~/.oci/config
          echo "user=${{ secrets.OCI_USER_OCID }}" >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}" >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}" >> ~/.oci/config
          echo "key_file=~/.oci/oci_api_key.pem" >> ~/.oci/config
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/config

      - name: Upload Frontend to OCI Bucket
        run: |
          oci os object bulk-upload \
            --namespace iddsu14hgang \
            --bucket-name sparky_tool \
            --src-dir ./frontend/dist/ \
            --overwrite \
            --content-type auto

# JOB 2: Package Python Backend and prepare environment
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Dynamically creates your complete production backend .env file inside the runner workspace
      - name: Inject Backend Secrets
        working-directory: backend
        run: |
          echo "PS_BASE_URL=${{ secrets.PS_BASE_URL }}" > .env
          echo "PS_AUTH_TYPE=${{ secrets.PS_AUTH_TYPE }}" >> .env
          echo "PS_USERNAME=${{ secrets.PS_USERNAME }}" >> .env
          echo "PS_PASSWORD=${{ secrets.PS_PASSWORD }}" >> .env
          echo "PS_ENDPOINT=${{ secrets.PS_ENDPOINT }}" >> .env
          echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "PS_PROCESS_NAME=${{ secrets.PS_PROCESS_NAME }}" >> .env
          echo "RETRIEVAL_METHOD=${{ secrets.RETRIEVAL_METHOD }}" >> .env
          echo "CLERK_JWKS_URL=${{ secrets.CLERK_JWKS_URL }}" >> .env
          echo "CLERK_API_KEY=${{ secrets.CLERK_API_KEY }}" >> .env
          echo "CLERK_API_SECRET=${{ secrets.CLERK_API_SECRET }}" >> .env
          echo "ENCRYPTION_KEY=${{ secrets.ENCRYPTION_KEY }}" >> .env
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" >> .env

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Backend Dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run Backend Tests
        working-directory: backend
        run: |
          if [ -n "$(find . -name 'test_*.py' -o -name '*_test.py' | head -1)" ]; then
            pytest --tb=short -q
          else
            echo "No backend tests found yet — skipping."
          fi

      - name: Verify Backend Environment Setup
        run: |
          echo "Backend .env file built securely inside the isolated pipeline."